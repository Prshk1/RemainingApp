<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verification - Remaining App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
                "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
                sans-serif;
            background: linear-gradient(135deg, #0B0616 0%, #1B0F2E 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #251640;
            border: 1px solid #2A1845;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        h1 {
            color: #FFFFFF;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: #A89BC2;
            font-size: 14px;
            line-height: 20px;
            margin-bottom: 20px;
        }

        .status {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border-left: 4px solid;
            line-height: 18px;
        }

        .status.loading {
            background: rgba(157, 92, 255, 0.1);
            border-left-color: #9D5CFF;
            color: #9D5CFF;
        }

        .status.success {
            background: #0F2A0F;
            border-left-color: #4CAF50;
            color: #66BB6A;
        }

        .status.error {
            background: rgba(255, 77, 77, 0.1);
            border-left-color: #FF4D4D;
            color: #FF6B6B;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(157, 92, 255, 0.3);
            border-top: 2px solid #9D5CFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #9D5CFF;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background: #7B3FE4;
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            background: #6B5B8A;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #1B0F2E;
            color: #9D5CFF;
            border: 1px solid #9D5CFF;
        }

        .btn-secondary:hover {
            background: #251640;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" id="icon">✉️</div>
        <h1 id="title">Verifying Email</h1>
        <p id="description">Please wait while we verify your email address...</p>

        <div class="status loading" id="status">
            <span class="spinner"></span>
            <span id="status-text">Processing verification...</span>
        </div>

        <div class="button-group" id="actions">
            <button class="btn-primary hidden" id="btn-app" onclick="goToApp()">
                Open App
            </button>
            <button class="btn-secondary hidden" id="btn-retry" onclick="location.reload()">
                Try Again
            </button>
        </div>
    </div>

    <script>
        // Supabase configuration (same as your app)
        const SUPABASE_URL = "https://mahtrgihjcvrnrwmjihj.supabase.co";
        const SUPABASE_ANON_KEY =
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1haHRyZ2loamN2cm5yd21qaWhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjQ2MDIsImV4cCI6MjA4ODgwMDYwMn0.UVAeKvWWM7l5T0eA7Vs1ASLpRqnDCDnJ-DERaKUN0UA";

        function readAuthParams() {
            const hashPart = window.location.hash.startsWith("#")
                ? window.location.hash.slice(1)
                : window.location.hash;
            const queryPart = window.location.search.startsWith("?")
                ? window.location.search.slice(1)
                : window.location.search;
            const hashParams = new URLSearchParams(hashPart);
            const queryParams = new URLSearchParams(queryPart);

            const get = (key) => hashParams.get(key) ?? queryParams.get(key);

            return {
                type: get("type"),
                accessToken: get("access_token"),
                refreshToken: get("refresh_token"),
                tokenHash: get("token_hash") ?? get("code"),
                fullHash: hashPart,
            };
        }

        // Import Supabase client
        const script = document.createElement("script");
        script.src =
            "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/+esm";
        script.type = "module";
        script.innerHTML = `
            import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/+esm";
            
            window.supabase = createClient("${SUPABASE_URL}", "${SUPABASE_ANON_KEY}");
            
            handleAuthRedirect();
        `;
        document.body.appendChild(script);

        async function handleAuthRedirect() {
            const { type, accessToken, refreshToken, tokenHash, fullHash } = readAuthParams();

            if (type === "recovery") {
                showRecoveryState();

                // If tokens already exist in URL, forward directly to app.
                if (accessToken && refreshToken) {
                    setTimeout(() => {
                        goToResetInApp(fullHash);
                    }, 700);
                    return;
                }

                // Some Supabase recovery links provide token_hash/code only.
                if (tokenHash) {
                    await exchangeRecoveryTokenAndRedirect(tokenHash);
                    return;
                }

                showError("Missing recovery token. Request a new password reset email.");
                return;
            }

            await verifyEmail();
        }

        async function verifyEmail() {
            try {
                const { type, tokenHash } = readAuthParams();

                if (type !== "email_confirmation") {
                    showError(
                        "Invalid or unsupported link. Request a new verification or reset email."
                    );
                    return;
                }

                if (!tokenHash) {
                    showError("Missing verification token. Request a new verification email.");
                    return;
                }

                updateStatus("Verifying with Supabase...");

                // Exchange the code for a session using verifyOtp
                const { data, error } = await window.supabase.auth.verifyOtp({
                    token_hash: tokenHash,
                    type: "email",
                });

                if (error) {
                    showError(error.message || "Email verification failed. The link may have expired.");
                    return;
                }

                if (data?.session) {
                    showSuccess("✓ Email verified successfully!");
                    setTimeout(() => {
                        goToApp();
                    }, 1200);
                } else {
                    showError("Verification completed but session not created. Please sign in manually.");
                }
            } catch (err) {
                console.error("Verification error:", err);
                showError(
                    "An unexpected error occurred. Please try again or contact support."
                );
            }
        }

        async function exchangeRecoveryTokenAndRedirect(tokenHash) {
            try {
                updateStatus("Preparing password reset...");

                const { data, error } = await window.supabase.auth.verifyOtp({
                    token_hash: tokenHash,
                    type: "recovery",
                });

                if (error || !data?.session) {
                    showError(error?.message || "Reset link is invalid or expired. Request a new one.");
                    return;
                }

                const resetHash = new URLSearchParams({
                    access_token: data.session.access_token,
                    refresh_token: data.session.refresh_token,
                    type: "recovery",
                }).toString();

                setTimeout(() => {
                    goToResetInApp(resetHash);
                }, 600);
            } catch (err) {
                console.error("Recovery exchange error:", err);
                showError("Unable to process password reset link. Request a new email.");
            }
        }

        function showRecoveryState() {
            const statusEl = document.getElementById("status");
            const statusText = document.getElementById("status-text");
            const icon = document.getElementById("icon");

            icon.textContent = "🔐";
            document.getElementById("title").textContent = "Password Reset";
            document.getElementById("description").textContent = "Opening the app to reset your password...";
            statusEl.className = "status loading";
            statusText.textContent = "Redirecting to Remaining app...";

            document.getElementById("btn-app").classList.remove("hidden");
        }

        function updateStatus(message) {
            const statusEl = document.getElementById("status");
            const statusText = document.getElementById("status-text");
            statusText.textContent = message;
            statusEl.className = "status loading";
        }

        function showSuccess(message) {
            const statusEl = document.getElementById("status");
            const statusText = document.getElementById("status-text");
            const icon = document.getElementById("icon");

            icon.textContent = "✓";
            document.getElementById("title").textContent = "Email Verified";
            document.getElementById("description").textContent = "Your email has been successfully verified. Redirecting...";
            statusEl.className = "status success";
            statusText.textContent = message;

            document.getElementById("btn-app").classList.remove("hidden");
        }

        function showError(message) {
            const statusEl = document.getElementById("status");
            const statusText = document.getElementById("status-text");
            const icon = document.getElementById("icon");

            icon.textContent = "⚠️";
            document.getElementById("title").textContent = "Authentication Link Failed";
            document.getElementById("description").textContent =
                "We couldn't process this link. Please request a new email.";
            statusEl.className = "status error";
            statusText.textContent = message;

            document.getElementById("btn-retry").classList.remove("hidden");
        }

        function goToApp() {
            window.location.href = "remaining://app";
        }

        function goToResetInApp(hash) {
            window.location.href = hash
                ? "remaining://reset-password#" + hash
                : "remaining://reset-password";
        }
    </script>
</body>
</html>
